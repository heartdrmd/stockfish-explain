services:
  - type: web
    name: stockfish-explain
    runtime: node
    plan: starter               # $7/mo, no cold starts. Swap to "free" to save money but users wait ~30s on first hit.
    region: ohio                # Closest to Central US (user's timezone).
    # Build: install node deps, pull the 108 MB full-NNUE WASMs from the
    # GitHub Release (they can't live in the repo — GitHub rejects >100 MB).
    buildCommand: "npm install && bash scripts/fetch-full-wasms.sh && bash scripts/fetch-lichess-stockfish.sh"
    startCommand: "node server.js"
    # Auto-deploy whenever main branch is pushed.
    autoDeploy: true
    # ANTHROPIC_API_KEY must be set in the Render dashboard (Environment tab).
    # It's encrypted at rest and never checked into git.
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false             # Render will prompt you to enter it in the dashboard
      - key: NODE_ENV
        value: production
    # Health check hits the root — /api/whoami is cheap and returns JSON.
    healthCheckPath: /api/whoami
