databases:
  # Postgres for multi-user game archives, mistakes, SRS, favourites.
  # Starter plan is $7/mo (0.5 GB storage, 97 connection limit). More
  # than enough for a friend-group: ~10 KB/game × 1000 games = 10 MB
  # per user. Swap to 'basic' ($12) if we hit the storage cap later.
  - name: stockfish-explain-db
    plan: starter
    region: ohio
    databaseName: stockfish_explain
    user: stockfish_explain

services:
  - type: web
    name: stockfish-explain
    runtime: node
    plan: starter
    region: ohio
    buildCommand: "npm install && bash scripts/fetch-full-wasms.sh && bash scripts/fetch-lichess-stockfish.sh"
    startCommand: "node server.js"
    autoDeploy: true
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
      # DATABASE_URL is auto-populated by Render when the web service
      # is linked to the database above via the fromDatabase binding.
      # When creating the DB manually, paste the Internal Database URL
      # into the Environment tab instead.
      - key: DATABASE_URL
        fromDatabase:
          name: stockfish-explain-db
          property: connectionString
    healthCheckPath: /api/whoami
